{% extends "base.html" %}

{% block titulo %}Página Inicial{% endblock %}

{% block conteudo %}
    {% if usuario_logado %}
    <h1>
        Bem-vindo(a), {{ pessoa.nome }}
    </h1>
    <ul>
        {% for p in pessoa.produtos %}
            <li>{{ p }}</li>
        {% endfor %}
    </ul>
    {% else %}
    {% endif %}
        <a href="{{ url_for('login')}}">Fazer login</a>
{% endblock%}
